<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Vivid Caseload</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{font-family:'Inter',sans-serif}
.round{border-radius:10px}
#map{height:320px}
.modal{z-index:50}
.dim{filter:brightness(.55)}
.rowHover:hover{transform:scale(1.01);background:#f3f5ee}
</style>

<script>
tailwind.config={theme:{extend:{colors:{brand:'#708b42'}}}}
</script>
</head>

<body class="bg-gray-50 text-gray-800">

<!-- LOGIN -->
<div id="login" class="h-screen flex items-center justify-center">
  <div class="bg-white p-10 shadow round w-96 text-center">
    <img src="https://vividearlylearning.com.au/wp-content/uploads/2025/07/Vivid-Early-Learning_RGB_Primary-logo_fullcolor-300x142.png" class="h-14 mx-auto mb-4"/>
    <h1 class="text-xl font-semibold mb-4">Caseload Login</h1>
    <input id="pw" type="password" class="border p-3 w-full round" placeholder="Password"
      onkeydown="if(event.key==='Enter')loginCheck()"/>
    <p id="pwErr" class="text-red-600 text-sm hidden mt-2">Incorrect password</p>
    <button onclick="loginCheck()" class="mt-4 bg-brand text-white p-3 w-full round">Enter</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header class="bg-white shadow px-6 py-4 flex justify-between items-center">
  <div class="flex items-center gap-6">
    <img src="https://vividearlylearning.com.au/wp-content/uploads/2025/07/Vivid-Early-Learning_RGB_Primary-logo_fullcolor-300x142.png" class="h-10"/>
    <select id="therapistFilter" class="border p-2 round"></select>
  </div>
  <div class="flex gap-3">
    <button onclick="toggleDark()" class="border px-4 py-2 round">Theme</button>
    <button onclick="openStaff()" class="border px-4 py-2 round">Edit Staff</button>
    <button onclick="openClient()" class="bg-brand text-white px-4 py-2 round">Add Client</button>
  </div>
</header>

<section id="mapWrap" class="p-6">
  <div id="map" class="round shadow"></div>
</section>

<section class="p-6">
<table class="w-full bg-white shadow round text-sm">
<thead class="bg-gray-100">
<tr>
<th class="p-3 text-left">Name</th>
<th>Address</th>
<th>LGA</th>
<th>Lead Therapist</th>
<th></th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</section>

<footer class="text-center text-xs py-6 text-gray-500">
Made with love by Will Berry ♡
</footer>

</div>

<!-- MODAL -->
<div id="overlay" class="hidden fixed inset-0 bg-black bg-opacity-40 modal flex items-center justify-center"></div>

<script>
/* DATA */
let STAFF=JSON.parse(localStorage.getItem("staff")||'["Megan","Lara M","Liv"]');
let clients=JSON.parse(localStorage.getItem("clients")||"[]");
let map, markers=[];
let lat=null,lng=null,current=null;

/* LOGIN */
function loginCheck(){
 if(pw.value==="vividearlylearning"){login.style.display="none";app.style.display="block";init();}
 else pwErr.classList.remove("hidden");
}

/* INIT */
function init(){
 map=L.map('map').setView([-32.9,151.75],10);
 L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
 buildTherapistFilter();
 renderAll();
}

/* UI HELPERS */
function showModal(html){
 overlay.innerHTML=`<div class="bg-white p-8 round w-[700px] relative">
 <button class="absolute top-3 right-4 text-xl" onclick="closeModal()">×</button>${html}</div>`;
 overlay.classList.remove("hidden");
 mapWrap.classList.add("dim");
}
function closeModal(){overlay.classList.add("hidden");mapWrap.classList.remove("dim");overlay.innerHTML="";}

/* THEME */
function toggleDark(){document.body.classList.toggle("bg-gray-900");document.body.classList.toggle("text-white");}

/* FILTER */
function buildTherapistFilter(){
 therapistFilter.innerHTML='<option value="">All Therapists</option>'+STAFF.map(s=>`<option>${s}</option>`);
 therapistFilter.onchange=renderAll;
}

/* RENDER */
function renderAll(){renderTable();renderMap();}
function renderTable(){
 tableBody.innerHTML="";
 clients.filter(c=>!therapistFilter.value||c.lead===therapistFilter.value)
 .forEach((c,i)=>{
 tableBody.innerHTML+=`
 <tr class="border-t rowHover cursor-pointer" onclick="viewClient(${i})">
  <td class="p-3">${c.name}</td>
  <td>${c.address}</td>
  <td>${c.lga}</td>
  <td>${c.lead}</td>
  <td onclick="event.stopPropagation()" class="space-x-2">
   <button onclick="comments(${i})">💬</button>
   <button onclick="editClient(${i})">✏️</button>
   <button onclick="removeClient(${i})">🗑️</button>
  </td>
 </tr>`;
 });
}

function renderMap(){
 markers.forEach(m=>map.removeLayer(m)); markers=[];
 clients.forEach(c=>{
  if(c.lat) markers.push(L.marker([c.lat,c.lng]).addTo(map).bindPopup(c.name));
 });
}

/* CLIENT VIEW */
function viewClient(i){
 const c=clients[i];
 showModal(`<h2 class="text-xl font-semibold mb-4">${c.name}</h2>
 <div class="grid grid-cols-2 gap-4 text-sm">
 <div><b>Address:</b> ${c.address}</div>
 <div><b>LGA:</b> ${c.lga}</div>
 <div><b>Lead Therapist:</b> ${c.lead}</div>
 <div><b>Contact:</b> ${c.contact}</div>
 <div><b>Frequency:</b> ${c.freq}</div>
 </div>`);
}

/* ADD / EDIT CLIENT */
function openClient(){current=null;clientForm();}
function editClient(i){current=i;clientForm(clients[i]);}

function clientForm(c={}){
 showModal(`
 <h2 class="text-xl font-semibold mb-4">Client</h2>
 <input id="n" class="border p-2 w-full mb-2 round" placeholder="Name" value="${c.name||''}" onkeydown="if(event.key==='Enter')saveClient()"/>
 <input id="addr" oninput="lookup(this.value)" class="border p-2 w-full mb-1 round" placeholder="Address" value="${c.address||''}"/>
 <div id="addrList" class="text-sm mb-2"></div>
 <input id="lga" class="border p-2 w-full mb-2 round" placeholder="LGA" value="${c.lga||''}"/>
 <input id="contact" class="border p-2 w-full mb-2 round" placeholder="Contact Number" value="${c.contact||''}"/>
 <input id="freq" class="border p-2 w-full mb-2 round" placeholder="Frequency" value="${c.freq||''}"/>
 <button onclick="saveClient()" class="bg-brand text-white px-4 py-2 round">Save</button>
 `);
}

function lookup(q){
 fetch(`https://nominatim.openstreetmap.org/search?country=Australia&format=json&q=${q}`)
 .then(r=>r.json()).then(d=>{
  addrList.innerHTML=d.slice(0,5).map(a=>
  `<div class="p-2 hover:bg-gray-100 cursor-pointer"
  onclick="selAddr('${a.display_name}',${a.lat},${a.lon})">${a.display_name}</div>`).join('');
 });
}
function selAddr(a,la,ln){addr.value=a;lat=la;lng=ln;addrList.innerHTML="";}

function saveClient(){
 const c={
  name:n.value,address:addr.value,lga:lga.value,
  lead:therapistFilter.value||STAFF[0],
  contact:contact.value,freq:freq.value,
  lat,lng,comments:(current!==null?clients[current].comments:[])
 };
 if(current!==null) clients[current]=c; else clients.push(c);
 localStorage.setItem("clients",JSON.stringify(clients));
 closeModal();renderAll();
}

/* COMMENTS */
function comments(i){
 const c=clients[i];
 showModal(`<h2 class="text-xl font-semibold mb-4">Comments — ${c.name}</h2>
 <div>${(c.comments||[]).map((cm,ix)=>`
 <div class="flex justify-between border-b py-2">${cm}
 <button onclick="delComment(${i},${ix})">🗑️</button></div>`).join('')}</div>
 <input id="newC" class="border p-2 w-full mt-3 round"/>
 <button onclick="addComment(${i})" class="mt-2 bg-brand text-white px-3 py-2 round">Add</button>`);
}
function addComment(i){
 clients[i].comments=(clients[i].comments||[]);
 clients[i].comments.push(newC.value);
 localStorage.setItem("clients",JSON.stringify(clients));
 closeModal();renderAll();
}
function delComment(i,x){
 clients[i].comments.splice(x,1);
 localStorage.setItem("clients",JSON.stringify(clients));
 closeModal();renderAll();
}

/* DELETE */
function removeClient(i){
 if(confirm("Are you sure?")){
  clients.splice(i,1);
  localStorage.setItem("clients",JSON.stringify(clients));
  renderAll();
 }
}

/* STAFF */
function openStaff(){
 showModal(`<h2 class="text-xl font-semibold mb-4">Staff</h2>
 ${STAFF.map((s,i)=>`<div class="flex justify-between mb-2">${s}
 <button onclick="STAFF.splice(${i},1);saveStaff()">🗑️</button></div>`).join('')}
 <input id="ns" class="border p-2 w-full round mt-2" placeholder="Add staff"/>
 <button onclick="STAFF.push(ns.value);saveStaff()" class="mt-2 bg-brand text-white px-3 py-2 round">Add</button>`);
}
function saveStaff(){localStorage.setItem("staff",JSON.stringify(STAFF));closeModal();buildTherapistFilter();}
</script>
</body>
</html>
